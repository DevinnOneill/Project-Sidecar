<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SideCar — Intelligence Bar</title>

  <!-- Font Loading — Layer 1: CDN. Layer 2: local woff2 via style.css @font-face. Layer 3: system stacks. (C-05) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Covenant Design System (MOD-CSS — read only) -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* ================================================================
       MOD-P2 — page2.html — Intelligence Bar
       Module boundary: this file only. No writes to style.css or app.js.
       Token authority: reads from style.css :root (Covenant light mode).
       Constraints: C-04, C-11, C-12, C-14. NMCI Chrome 110+ safe.
    ================================================================ */

    /* ── Page base — warm linen with centered bloom ── */
    body {
      background-color: var(--color-bg-base);
      background-image: radial-gradient(
        ellipse 80% 60% at 50% 44%,
        var(--color-bg-surface) 0%,
        transparent 100%
      );
      color: var(--color-text-primary);
      overflow: hidden;
      margin: 0;
    }

    /* ── Corner Brackets ─────────────────────────────────────── */
    .ib-bracket {
      position: fixed;
      width: 28px;
      height: 28px;
      z-index: 20;
      transition: border-color 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .ib-bracket--tl {
      top: 24px; left: 24px;
      border-top: 1px solid var(--color-navy-700);
      border-left: 1px solid var(--color-navy-700);
    }
    .ib-bracket--tr {
      top: 24px; right: 24px;
      border-top: 1px solid var(--color-navy-700);
      border-right: 1px solid var(--color-navy-700);
    }
    .ib-bracket--bl {
      bottom: 24px; left: 24px;
      border-bottom: 1px solid var(--color-navy-700);
      border-left: 1px solid var(--color-navy-700);
    }
    .ib-bracket--br {
      bottom: 24px; right: 24px;
      border-bottom: 1px solid var(--color-navy-700);
      border-right: 1px solid var(--color-navy-700);
    }
    .ib-bracket--gold-tl {
      border-top-color: var(--color-earth-500);
      border-left-color: var(--color-earth-500);
    }
    .ib-bracket--gold-tr {
      border-top-color: var(--color-earth-500);
      border-right-color: var(--color-earth-500);
    }
    .ib-bracket--gold-bl {
      border-bottom-color: var(--color-earth-500);
      border-left-color: var(--color-earth-500);
    }
    .ib-bracket--gold-br {
      border-bottom-color: var(--color-earth-500);
      border-right-color: var(--color-earth-500);
    }

    /* ── Status Line ─────────────────────────────────────────── */
    .ib-status {
      position: fixed;
      top: 20px;
      right: 68px;
      font-family: var(--font-data);
      font-size: 10px;
      letter-spacing: var(--tracking-caps);
      text-transform: uppercase;
      color: var(--color-text-muted);
      z-index: 20;
      pointer-events: none;
    }

    /* ── Composition ─────────────────────────────────────────── */
    .ib-composition {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      max-width: 680px;
      padding: 0 var(--space-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      transition: top 0.7s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .ib-composition--elevated {
      top: 44px;
      transform: translateX(-50%);
    }

    /* ── Brand Block ─────────────────────────────────────────── */
    .ib-brand {
      text-align: center;
      margin-bottom: var(--space-xl);
    }
    .ib-brand__logotype {
      font-family: var(--font-display);
      font-size: 80px;
      line-height: var(--leading-tight);
      letter-spacing: 10px;
      text-transform: uppercase;
      color: var(--color-navy-700);
    }
    .ib-brand__logotype-accent {
      color: var(--color-earth-500);
    }
    .ib-brand__rule {
      width: 48px;
      height: 1px;
      background-color: var(--color-border-gold);
      margin: var(--space-md) auto var(--space-sm);
    }
    .ib-brand__subtitle {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 13px;
      letter-spacing: 0.01em;
      color: var(--color-text-muted);
    }

    /* ── Search Bar ──────────────────────────────────────────── */
    .ib-search {
      width: 100%;
    }
    .ib-search__bar {
      display: flex;
      align-items: center;
      height: 54px;
      background-color: var(--color-bg-surface);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-lg);
      padding: 0 var(--space-md) 0 var(--space-lg);
      cursor: text;
      box-shadow: var(--shadow-soft);
      transition: border-color 0.3s, box-shadow 0.3s, background-color 0.3s;
    }
    .ib-search__bar--focused {
      border-color: var(--color-earth-500);
      box-shadow: 0 0 0 2px var(--color-earth-100), var(--shadow-card);
      background-color: var(--color-bg-base);
    }
    .ib-search__icon {
      color: var(--color-text-muted);
      margin-right: var(--space-md);
      flex-shrink: 0;
    }
    .ib-search__input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-style: italic;
      font-size: 15px;
      color: var(--color-text-primary);
      min-width: 0;
    }
    .ib-search__input::placeholder {
      color: var(--color-text-muted);
    }
    .ib-search__hint {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--color-text-muted);
      background-color: var(--color-bg-sunken);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-sm);
      padding: 2px 7px;
      flex-shrink: 0;
      line-height: 1.6;
    }

    /* ── Filter Chips ────────────────────────────────────────── */
    .ib-chips {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-md);
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 0.3s 0.15s, transform 0.3s 0.15s;
    }
    .ib-chips--visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .ib-chip {
      background: none;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-full);
      padding: 4px 14px;
      font-family: var(--font-data);
      font-size: 11px;
      letter-spacing: var(--tracking-data);
      color: var(--color-text-muted);
      cursor: pointer;
      transition: color 0.2s, background-color 0.2s, border-color 0.2s;
    }
    .ib-chip:hover {
      color: var(--color-earth-700);
      background-color: var(--color-bg-sunken);
      border-color: var(--color-border-strong);
    }
    .ib-chip--active {
      color: var(--color-earth-700);
      background-color: var(--color-earth-100);
      border-color: var(--color-earth-500);
    }

    /* ── Hero Role Cards ─────────────────────────────────────── */
    .ib-hero-cards {
      display: flex;
      gap: var(--space-md);
      margin-top: var(--space-xl);
      width: 100%;
      opacity: 1;
      transform: translateY(0);
      max-height: 300px;
      overflow: hidden;
      transition: opacity 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                  max-height 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                  margin-top 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .ib-hero-cards--hidden {
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      max-height: 0;
      margin-top: 0;
    }
    .ib-hero-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      padding: var(--space-lg) var(--space-md);
      background-color: var(--color-bg-surface);
      border: 1px solid var(--color-border-subtle);
      border-top: 2px solid transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      text-align: center;
      box-shadow: var(--shadow-soft);
      transition: border-color 0.25s,
                  border-top-color 0.25s,
                  background-color 0.25s,
                  box-shadow 0.25s;
    }
    .ib-hero-card:hover {
      border-color: var(--color-border-strong);
      border-top-color: var(--color-earth-500);
      background-color: var(--color-bg-base);
      box-shadow: var(--shadow-card);
    }
    .ib-hero-card--active {
      border-color: var(--color-earth-300);
      border-top-color: var(--color-earth-500);
      background-color: var(--color-bg-base);
      box-shadow: var(--shadow-card);
    }
    .ib-hero-card__icon {
      color: var(--color-text-muted);
      transition: color 0.25s;
    }
    .ib-hero-card:hover .ib-hero-card__icon,
    .ib-hero-card--active .ib-hero-card__icon {
      color: var(--color-earth-500);
    }
    .ib-hero-card__title {
      font-family: var(--font-display);
      font-size: 18px;
      letter-spacing: var(--tracking-display);
      text-transform: uppercase;
      color: var(--color-navy-700);
      line-height: var(--leading-tight);
    }
    .ib-hero-card--active .ib-hero-card__title {
      color: var(--color-earth-700);
    }

    /* ── Results Panel ───────────────────────────────────────── */
    .ib-results {
      position: fixed;
      top: 290px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 680px;
      padding: 0 var(--space-lg);
      max-height: 0;
      overflow: hidden;
      z-index: 8;
      transition: max-height 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .ib-results--visible {
      max-height: calc(100vh - 310px);
      overflow-y: auto;
    }
    .ib-results--visible::-webkit-scrollbar { width: 3px; }
    .ib-results--visible::-webkit-scrollbar-track { background: transparent; }
    .ib-results--visible::-webkit-scrollbar-thumb {
      background: var(--color-border-default);
      border-radius: var(--radius-full);
    }
    .ib-results-inner {
      padding-top: var(--space-sm);
      padding-bottom: var(--space-3xl);
    }

    /* ── Result Group Headers ────────────────────────────────── */
    .ib-group-header {
      font-family: var(--font-data);
      font-size: 10px;
      letter-spacing: var(--tracking-caps);
      text-transform: uppercase;
      color: var(--color-text-muted);
      padding: var(--space-sm) 0 6px;
      border-bottom: 1px solid var(--color-border-subtle);
      margin-top: var(--space-lg);
      margin-bottom: var(--space-sm);
    }
    .ib-group-header:first-child { margin-top: 0; }

    /* ── Result Rows ─────────────────────────────────────────── */
    .ib-result-row {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: 9px var(--space-sm);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background-color 0.15s;
    }
    .ib-result-row:hover { background-color: var(--color-bg-surface); }
    .ib-result-row--highlighted {
      background-color: var(--color-earth-100);
      outline: none;
    }
    .ib-result-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ib-result-square {
      width: 8px; height: 8px;
      border-radius: 1px;
      flex-shrink: 0;
    }
    .ib-result-name {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--color-text-primary);
      min-width: 170px;
      flex-shrink: 0;
    }
    .ib-result-meta {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--color-text-secondary);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ib-result-badge {
      font-family: var(--font-data);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-caps);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      white-space: nowrap;
    }
    .ib-result-score {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--color-earth-700);
      min-width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Empty State ─────────────────────────────────────────── */
    .ib-empty {
      font-family: var(--font-data);
      font-size: 11px;
      letter-spacing: var(--tracking-caps);
      text-transform: uppercase;
      color: var(--color-text-muted);
      text-align: center;
      padding: var(--space-2xl) 0;
    }
  </style>
</head>
<body>

  <!-- Corner Brackets -->
  <div class="ib-bracket ib-bracket--tl" id="brk-tl"></div>
  <div class="ib-bracket ib-bracket--tr" id="brk-tr"></div>
  <div class="ib-bracket ib-bracket--bl" id="brk-bl"></div>
  <div class="ib-bracket ib-bracket--br" id="brk-br"></div>

  <!-- Status Line -->
  <div class="ib-status">SIDECAR v1.0</div>

  <!-- Composition: Brand + Search + Cards -->
  <div class="ib-composition" id="ib-composition">

    <!-- Brand -->
    <div class="ib-brand">
      <div class="ib-brand__logotype">
        SIDE<span class="ib-brand__logotype-accent">[CAR]</span>
      </div>
      <div class="ib-brand__rule" aria-hidden="true"></div>
      <div class="ib-brand__subtitle">Solving yesterday's problems tomorrow</div>
    </div>

    <!-- Search Bar -->
    <div class="ib-search">
      <div class="ib-search__bar" id="ib-search-bar" role="search">
        <svg class="ib-search__icon" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.75"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="search"
          class="ib-search__input"
          id="ib-input"
          placeholder="Search sailors, billets, commands..."
          autocomplete="off"
          spellcheck="false"
          aria-label="Search sailors, billets, or commands"
        >
        <span class="ib-search__hint" aria-hidden="true">/</span>
      </div>

      <!-- Filter Chips -->
      <div class="ib-chips" id="ib-chips" role="group" aria-label="Filter results"></div>
    </div>

    <!-- Hero Role Cards -->
    <div class="ib-hero-cards" id="ib-hero-cards" role="group" aria-label="Select your role">

      <button class="ib-hero-card ib-hero-card--active" data-role="detailer"
              type="button" aria-pressed="true">
        <svg class="ib-hero-card__icon" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="ib-hero-card__title">Detailer</span>
      </button>

      <button class="ib-hero-card" data-role="placement"
              type="button" aria-pressed="false">
        <svg class="ib-hero-card__icon" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="5" r="2"/>
          <path d="M12 7v13"/>
          <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
        </svg>
        <span class="ib-hero-card__title">Placement</span>
      </button>

      <button class="ib-hero-card" data-role="evaluator"
              type="button" aria-pressed="false">
        <svg class="ib-hero-card__icon" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
          <line x1="2"  y1="20" x2="22" y2="20"/>
        </svg>
        <span class="ib-hero-card__title">Analytics</span>
      </button>

    </div>

  </div><!-- /ib-composition -->

  <!-- Results Panel -->
  <div class="ib-results" id="ib-results" role="listbox" aria-label="Search results">
    <div class="ib-results-inner" id="ib-results-inner"></div>
  </div>

  <script src="app.js"></script>
  <script>
    /* ================================================================
       INTELLIGENCE BAR ENGINE — page2.html
       Module: MOD-P2 | Constraints: C-02, C-03, C-09, C-11, C-12, C-14
       Boundary: reads style.css, app.js — writes page2.html only
    ================================================================ */
    'use strict';

    /* ── Synthetic flag supplement (cannot modify app.js / MOD-JS) ── */
    var LOCAL_FLAGS = {
      '9999000001': ['LIMDU', 'ORDMOD'],
      '9999000002': [],
      '9999000003': ['COLO'],
      '9999000004': [],
      '9999000005': [],
      '9999000006': ['ORDMOD'],
      '9999000007': ['LIMDU', 'COLO'],
      '9999000008': [],
      '9999000009': [],
      '9999000010': [],
      '9999000011': [],
      '9999000012': []
    };

    var ROLE_CHIPS = {
      detailer:  ['All', 'Sailors', 'Billets', 'Critical', 'Flagged'],
      placement: ['All', 'Commands', 'Undermanned', 'Critical PRD', 'Flagged']
    };

    var CHIP_FILTER_KEY = {
      'all': 'all', 'sailors': 'all', 'billets': 'all',
      'critical': 'critical', 'flagged': 'flagged',
      'commands': 'all', 'undermanned': 'critical', 'critical prd': 'critical'
    };

    /* ── State ── */
    var state = {
      role: 'detailer',
      isActivated: false,
      activeChip: 'all',
      sailors: [],
      sailorScores: [],
      commandScores: [],
      highlightedIndex: -1,
      searchTimer: null
    };

    /* ── Utility ── */
    function daysSince(dateStr) {
      if (!dateStr) return 999;
      var d = parseDate(dateStr);
      return Math.max(0, Math.floor((Date.now() - d.getTime()) / 86400000));
    }

    /* ── PageRank: Detailer (Sailors) ── */
    function computeSailorScores(sailors) {
      var n = sailors.length;
      var base = n > 0 ? (1 - 0.85) / n : 0;
      return sailors.map(function(sailor) {
        var prdTier = computePRDTier(sailor);
        var prdScore = [1.0, 0.75, 0.50, 0.25, 0.0][prdTier.priority] || 0;
        var days = daysSince(sailor.lastContact);
        var commScore = Math.min(1, days / 120);
        var flags = LOCAL_FLAGS[sailor.id] || [];
        var flagScore = Math.min(1, flags.length / 3);
        var compoundScore = flags.length >= 2 ? 1 : 0;
        var raw = (0.40 * prdScore) + (0.25 * commScore) + (0.20 * flagScore) + (0.15 * compoundScore);
        return {
          sailor: sailor,
          score: Math.round((0.85 * raw + base) * 1000) / 10,
          prdTier: prdTier,
          flags: flags,
          daysSinceComm: days
        };
      }).sort(function(a, b) { return b.score - a.score; });
    }

    /* ── PageRank: Placement (Commands) ── */
    function computeCommandScores(sailors) {
      var map = {};
      sailors.forEach(function(s) {
        if (!map[s.uic]) map[s.uic] = { uic: s.uic, name: s.command, sailors: [] };
        map[s.uic].sailors.push(s);
      });
      var commands = Object.keys(map).map(function(k) { return map[k]; });
      var n = commands.length;
      var base = n > 0 ? (1 - 0.85) / n : 0;
      return commands.map(function(cmd) {
        var cs = cmd.sailors;
        var filled = cs.length;
        var total = Math.max(filled, Math.round(filled * 1.15));
        var manningPct = (filled / total) * 100;
        var criticalCount = cs.filter(function(s) { return computePRDTier(s).priority <= 1; }).length;
        var totalFlags = cs.reduce(function(a, s) { return a + (LOCAL_FLAGS[s.id] ? LOCAL_FLAGS[s.id].length : 0); }, 0);
        var staleCount = cs.filter(function(s) { return daysSince(s.lastContact) > 30; }).length;
        var raw = (0.35 * (1 - filled / total))
                + (0.30 * (criticalCount / filled))
                + (0.20 * Math.min(1, totalFlags / Math.max(1, filled * 2)))
                + (0.15 * (staleCount / filled));
        var tier = manningPct < 70 ? { label: 'CRITICAL', priority: 0 }
                 : manningPct < 90 ? { label: 'AT RISK',  priority: 1 }
                 : manningPct < 95 ? { label: 'ADEQUATE', priority: 2 }
                 :                   { label: 'FULL',     priority: 3 };
        return {
          command: cmd,
          score: Math.round((0.85 * raw + base) * 1000) / 10,
          manningPct: Math.round(manningPct),
          manningTier: tier,
          criticalCount: criticalCount,
          totalFlags: totalFlags
        };
      }).sort(function(a, b) { return b.score - a.score; });
    }

    /* ── Search ── */
    function filterSailors(query, chipKey) {
      var pool = state.sailorScores;
      if (chipKey === 'critical') pool = pool.filter(function(r) { return r.prdTier.priority <= 1; });
      else if (chipKey === 'flagged') pool = pool.filter(function(r) { return r.flags.length > 0; });
      if (query && query.trim()) {
        var terms = query.trim().toLowerCase().split(/\s+/);
        pool = pool.filter(function(r) {
          var s = r.sailor;
          var text = [s.lastName, s.firstName, s.rate, s.payGrade, s.command, s.uic, r.flags.join(' ')].join(' ').toLowerCase();
          return terms.every(function(t) { return text.indexOf(t) !== -1; });
        });
        return pool;
      }
      return pool.slice(0, 15);
    }

    function filterCommands(query, chipKey) {
      var pool = state.commandScores;
      if (chipKey === 'critical') pool = pool.filter(function(r) { return r.manningTier.priority === 0; });
      else if (chipKey === 'flagged') pool = pool.filter(function(r) { return r.totalFlags > 0; });
      if (query && query.trim()) {
        var terms = query.trim().toLowerCase().split(/\s+/);
        pool = pool.filter(function(r) {
          var names = state.sailors.filter(function(s) { return s.uic === r.command.uic; })
            .map(function(s) { return s.lastName + ' ' + s.firstName; }).join(' ');
          var text = [r.command.name, r.command.uic, names].join(' ').toLowerCase();
          return terms.every(function(t) { return text.indexOf(t) !== -1; });
        });
        return pool;
      }
      return pool.slice(0, 15);
    }

    /* ── Color helpers (C-14 — PRD tokens for PRD only; manning reuses urgency palette contextually) ── */
    function prdDotColor(t) {
      return { EXPIRED: 'var(--color-dot-escalated)', CRITICAL: 'var(--color-dot-red)',
               URGENT: 'var(--color-dot-yellow)', WATCH: 'var(--color-dot-green)',
               STABLE: 'var(--color-dot-gray)' }[t] || 'var(--color-dot-gray)';
    }
    function prdBadgeStyle(t) {
      return { EXPIRED:  'background:var(--color-prd-escalated);color:var(--color-prd-escalated-text);',
               CRITICAL: 'background:var(--color-prd-red);color:var(--color-prd-red-text);',
               URGENT:   'background:var(--color-prd-yellow);color:var(--color-prd-yellow-text);',
               WATCH:    'background:var(--color-prd-green);color:var(--color-prd-green-text);',
               STABLE:   'background:var(--color-prd-gray);color:var(--color-prd-gray-text);' }[t]
             || 'background:var(--color-prd-gray);color:var(--color-prd-gray-text);';
    }
    function manningDotColor(t) {
      return { 'CRITICAL': 'var(--color-dot-red)', 'AT RISK': 'var(--color-dot-yellow)',
               'ADEQUATE': 'var(--color-dot-green)', 'FULL': 'var(--color-dot-gray)' }[t] || 'var(--color-dot-gray)';
    }
    function manningBadgeStyle(t) {
      return { 'CRITICAL': 'background:var(--color-prd-red);color:var(--color-prd-red-text);',
               'AT RISK':  'background:var(--color-prd-yellow);color:var(--color-prd-yellow-text);',
               'ADEQUATE': 'background:var(--color-prd-green);color:var(--color-prd-green-text);',
               'FULL':     'background:var(--color-prd-gray);color:var(--color-prd-gray-text);' }[t]
             || 'background:var(--color-prd-gray);color:var(--color-prd-gray-text);';
    }

    /* ── Rendering ── */
    function buildSailorHTML(results) {
      if (!results.length) return '<div class="ib-empty">No matches found</div>';
      var groups = [
        { label: 'EXPIRED / ESCALATION',       tiers: ['EXPIRED'],  items: [] },
        { label: 'CRITICAL — ACTION REQUIRED', tiers: ['CRITICAL'], items: [] },
        { label: 'URGENT',                      tiers: ['URGENT'],   items: [] },
        { label: 'WATCH',                       tiers: ['WATCH'],    items: [] },
        { label: 'STABLE',                      tiers: ['STABLE'],   items: [] }
      ];
      results.forEach(function(r) {
        for (var i = 0; i < groups.length; i++) {
          if (groups[i].tiers.indexOf(r.prdTier.tier) !== -1) { groups[i].items.push(r); break; }
        }
      });
      var html = '';
      groups.forEach(function(g) {
        if (!g.items.length) return;
        html += '<div class="ib-group-header">' + g.label + '</div>';
        g.items.forEach(function(r) {
          var s = r.sailor;
          var meta = [s.rate, s.payGrade, s.command];
          if (r.daysSinceComm > 30) meta.push(r.daysSinceComm + 'd no comm');
          if (r.flags.length) meta.push(r.flags.join(', '));
          html += '<div class="ib-result-row" data-sailor-id="' + s.id + '" tabindex="-1" role="option">'
               + '<div class="ib-result-dot" style="background-color:' + prdDotColor(r.prdTier.tier) + ';"></div>'
               + '<div class="ib-result-name">' + s.lastName + ', ' + s.firstName + '</div>'
               + '<div class="ib-result-meta">' + meta.join(' · ') + '</div>'
               + '<div class="ib-result-badge" style="' + prdBadgeStyle(r.prdTier.tier) + '">' + r.prdTier.tier + '</div>'
               + '<div class="ib-result-score">' + r.score.toFixed(1) + '</div>'
               + '</div>';
        });
      });
      return html;
    }

    function buildCommandHTML(results) {
      if (!results.length) return '<div class="ib-empty">No matches found</div>';
      var groups = [
        { label: 'CRITICAL MANNING (<70%)', tier: 'CRITICAL', items: [] },
        { label: 'AT RISK (70–89%)',        tier: 'AT RISK',  items: [] },
        { label: 'ADEQUATE (90–95%)',       tier: 'ADEQUATE', items: [] },
        { label: 'FULL (>95%)',             tier: 'FULL',     items: [] }
      ];
      results.forEach(function(r) {
        for (var i = 0; i < groups.length; i++) {
          if (groups[i].tier === r.manningTier.label) { groups[i].items.push(r); break; }
        }
      });
      var html = '';
      groups.forEach(function(g) {
        if (!g.items.length) return;
        html += '<div class="ib-group-header">' + g.label + '</div>';
        g.items.forEach(function(r) {
          var meta = ['Manning: ' + r.manningPct + '%'];
          if (r.criticalCount) meta.push(r.criticalCount + ' critical PRD');
          if (r.totalFlags) meta.push(r.totalFlags + ' flag' + (r.totalFlags > 1 ? 's' : ''));
          html += '<div class="ib-result-row" data-uic="' + r.command.uic + '" tabindex="-1" role="option">'
               + '<div class="ib-result-square" style="background-color:' + manningDotColor(r.manningTier.label) + ';"></div>'
               + '<div class="ib-result-name">' + r.command.name + '</div>'
               + '<div class="ib-result-meta">' + meta.join(' · ') + '</div>'
               + '<div class="ib-result-badge" style="' + manningBadgeStyle(r.manningTier.label) + '">' + r.manningTier.label + '</div>'
               + '<div class="ib-result-score">' + r.score.toFixed(1) + '</div>'
               + '</div>';
        });
      });
      return html;
    }

    function renderResults() {
      var query = document.getElementById('ib-input').value;
      var chipKey = CHIP_FILTER_KEY[state.activeChip] !== undefined ? CHIP_FILTER_KEY[state.activeChip] : 'all';
      var html = state.role === 'detailer'
        ? buildSailorHTML(filterSailors(query, chipKey))
        : buildCommandHTML(filterCommands(query, chipKey));
      var inner = document.getElementById('ib-results-inner');
      inner.innerHTML = html;
      state.highlightedIndex = -1;
      inner.querySelectorAll('.ib-result-row').forEach(function(row) {
        row.addEventListener('click', function() { navigateToResult(row); });
      });
    }

    function navigateToResult(row) {
      var sid = row.getAttribute('data-sailor-id');
      var uic = row.getAttribute('data-uic');
      if (sid) window.location.href = 'detailer.html?sailor=' + encodeURIComponent(sid);
      else if (uic) window.location.href = 'placement.html?uic=' + encodeURIComponent(uic);
    }

    /* ── Chips ── */
    function buildChips(role) {
      var container = document.getElementById('ib-chips');
      container.innerHTML = '';
      (ROLE_CHIPS[role] || ROLE_CHIPS.detailer).forEach(function(label, i) {
        var btn = document.createElement('button');
        btn.className = 'ib-chip' + (i === 0 ? ' ib-chip--active' : '');
        btn.setAttribute('data-chip', label.toLowerCase());
        btn.setAttribute('type', 'button');
        btn.textContent = label;
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          container.querySelectorAll('.ib-chip').forEach(function(c) { c.classList.remove('ib-chip--active'); });
          btn.classList.add('ib-chip--active');
          state.activeChip = btn.getAttribute('data-chip');
          renderResults();
        });
        container.appendChild(btn);
      });
    }

    /* ── Activation ── */
    function activate() {
      if (state.isActivated) return;
      state.isActivated = true;

      /* Measure card section BEFORE collapse so we can compute the
         panel's final top position without racing the CSS transition.
         elevatedCompH = full comp height − (cards height + cards margin-top)
         Panel top = composition final top (44px) + elevated height + 8px gap  */
      var cardsEl = document.getElementById('ib-hero-cards');
      var comp    = document.getElementById('ib-composition');
      var cardsMarginTop = parseInt(window.getComputedStyle(cardsEl).marginTop, 10) || 0;
      var elevatedCompH  = comp.offsetHeight - cardsEl.offsetHeight - cardsMarginTop;
      var panelTop = 44 + elevatedCompH + 8;

      comp.classList.add('ib-composition--elevated');
      cardsEl.classList.add('ib-hero-cards--hidden');
      document.getElementById('ib-chips').classList.add('ib-chips--visible');
      document.getElementById('ib-search-bar').classList.add('ib-search__bar--focused');
      ['tl','tr','bl','br'].forEach(function(c) {
        document.getElementById('brk-' + c).classList.add('ib-bracket--gold-' + c);
      });

      var panel = document.getElementById('ib-results');
      panel.style.top       = panelTop + 'px';
      panel.style.maxHeight = 'calc(100vh - ' + (panelTop + 20) + 'px)';

      setTimeout(function() {
        panel.classList.add('ib-results--visible');
        renderResults();
      }, 80);

      document.getElementById('ib-input').focus();
    }

    function deactivate() {
      if (!state.isActivated) return;
      if (document.getElementById('ib-input').value.trim()) return;
      state.isActivated = false;
      state.highlightedIndex = -1;
      document.getElementById('ib-composition').classList.remove('ib-composition--elevated');
      document.getElementById('ib-hero-cards').classList.remove('ib-hero-cards--hidden');
      document.getElementById('ib-chips').classList.remove('ib-chips--visible');
      document.getElementById('ib-search-bar').classList.remove('ib-search__bar--focused');
      document.getElementById('ib-results').classList.remove('ib-results--visible');
      ['tl','tr','bl','br'].forEach(function(c) {
        document.getElementById('brk-' + c).classList.remove('ib-bracket--gold-' + c);
      });
      document.getElementById('ib-input').blur();
    }

    /* ── Role switching ── */
    function setRole(role) {
      state.role = role;
      state.activeChip = 'all';
      document.querySelectorAll('.ib-hero-card').forEach(function(card) {
        var active = card.getAttribute('data-role') === role;
        card.classList.toggle('ib-hero-card--active', active);
        card.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
      buildChips(role);
      if (state.isActivated) renderResults();
    }

    /* ── Keyboard navigation ── */
    function moveHighlight(delta) {
      var rows = document.querySelectorAll('.ib-result-row');
      if (!rows.length) return;
      rows.forEach(function(r) { r.classList.remove('ib-result-row--highlighted'); });
      state.highlightedIndex = Math.max(0, Math.min(rows.length - 1, state.highlightedIndex + delta));
      rows[state.highlightedIndex].classList.add('ib-result-row--highlighted');
      rows[state.highlightedIndex].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    /* ── Init ── */
    document.addEventListener('DOMContentLoaded', function() {

      SideCarAdapter.getSailors().then(function(sailors) {
        state.sailors = sailors;
        state.sailorScores = computeSailorScores(sailors);
        state.commandScores = computeCommandScores(sailors);
        if (state.isActivated) renderResults();
      });

      buildChips('detailer');

      document.getElementById('ib-search-bar').addEventListener('click', activate);

      document.getElementById('ib-input').addEventListener('input', function() {
        clearTimeout(state.searchTimer);
        state.highlightedIndex = -1;
        state.searchTimer = setTimeout(renderResults, 80);
      });

      document.getElementById('ib-input').addEventListener('focus', function() {
        if (!state.isActivated) activate();
      });

      document.querySelectorAll('.ib-hero-card').forEach(function(card) {
        card.addEventListener('click', function(e) {
          e.stopPropagation();
          var role = card.getAttribute('data-role');
          if (role === 'evaluator') { window.location.href = 'analytics.html?role=evaluator'; return; }
          setRole(role);
          activate();
        });
      });

      document.addEventListener('keydown', function(e) {
        var input = document.getElementById('ib-input');
        if (e.key === '/' && document.activeElement !== input) { e.preventDefault(); activate(); return; }
        if (e.key === 'Escape') { input.value = ''; deactivate(); return; }
        if (!state.isActivated) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); moveHighlight(1); return; }
        if (e.key === 'ArrowUp')   { e.preventDefault(); moveHighlight(-1); return; }
        if (e.key === 'Enter') {
          var rows = document.querySelectorAll('.ib-result-row');
          if (state.highlightedIndex >= 0 && rows[state.highlightedIndex]) {
            navigateToResult(rows[state.highlightedIndex]); return;
          }
          if (rows.length === 1) navigateToResult(rows[0]);
        }
      });

      document.addEventListener('click', function(e) {
        if (!document.getElementById('ib-composition').contains(e.target) &&
            !document.getElementById('ib-results').contains(e.target)) {
          deactivate();
        }
      });
    });
  </script>
</body>
</html>
